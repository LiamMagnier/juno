name: Deploy to VM

# Builds on GitHub's runners (fast, lots of RAM) and ships only the build to the
# VM over SSH, so the low-RAM VM never has to run `next build` itself.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # manual "Run workflow" button

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Write production .env (single source of truth = PROD_ENV secret)
        env:
          PROD_ENV: ${{ secrets.PROD_ENV }}
        run: printf '%s\n' "$PROD_ENV" > .env

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build voice relay
        run: |
          npm ci --prefix relay
          npm run build --prefix relay

      - name: Configure SSH
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VM_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Ship build to the VM
        env:
          VM_USER: ${{ secrets.VM_USER }}
          VM_HOST: ${{ secrets.VM_HOST }}
        run: |
          # NOTE: --delete removes files on the VM absent from this checkout, so
          # every persistent runtime path MUST be excluded or it gets wiped on
          # each deploy. `.uploads` holds locally-stored user avatars/attachments
          # and `.env` holds the server secrets — losing either breaks prod.
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'relay/node_modules' \
            --exclude '.next/cache' \
            --exclude 'logs' \
            --exclude '.uploads' \
            --exclude '.env' \
            --exclude '.env.*' \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new" \
            ./ "$VM_USER@$VM_HOST:~/juno/"
          # `.env` itself is excluded from the rsync above so the VM keeps any
          # values that live ONLY on it. But PROD_ENV is the source of truth, so
          # ship EVERY key it defines and upsert them into the VM's runtime .env
          # (see merge step below): changed/rotated/new keys propagate, while
          # VM-only keys (absent from PROD_ENV) are preserved. Match real
          # assignment lines only — skip comments and blank lines.
          grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .env > .env.shared || true
          scp -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            .env.shared "$VM_USER@$VM_HOST:~/juno/.env.shared"

      - name: Post-deploy on the VM (install-if-changed, migrate, reload)
        env:
          VM_USER: ${{ secrets.VM_USER }}
          VM_HOST: ${{ secrets.VM_HOST }}
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            "$VM_USER@$VM_HOST" 'bash -s' <<'REMOTE'
          set -e
          cd ~/juno
          # Reinstall app deps only when the lockfile actually changed (rare).
          LOCK_HASH="$(sha256sum package-lock.json | awk '{print $1}')"
          if [ "$LOCK_HASH" != "$(cat ~/.juno-lock.sha 2>/dev/null || true)" ]; then
            echo "Dependencies changed — running npm ci…"
            npm ci
            echo "$LOCK_HASH" > ~/.juno-lock.sha
          else
            echo "Dependencies unchanged — skipping npm ci."
          fi
          # Relay runtime deps (small/fast) + prisma client + schema + reload.
          npm ci --omit=dev --prefix relay
          npx prisma generate
          # Historical deploys used db push and did not consistently record the
          # matching migrations. Converge that history once, then use reviewed
          # migrations exclusively on every subsequent deploy.
          if node scripts/baseline-production-migrations.mjs --status; then
            npx prisma migrate deploy
          else
            echo "Converging existing production schema with migration history…"
            npx prisma db push --skip-generate
            npx prisma db execute --file prisma/migrations/20260716200000_account_change_log/migration.sql --schema prisma/schema.prisma
            JUNO_ALLOW_MIGRATION_BASELINE=1 node scripts/baseline-production-migrations.mjs --apply
            npx prisma migrate deploy
          fi
          mkdir -p logs
          # Upsert every PROD_ENV key shipped alongside the build into the
          # runtime .env (replace-or-add per key), preserving any VM-only value
          # not present in PROD_ENV, so changed/new keys take effect on reload.
          # .env.bak is the pre-merge rollback.
          if [ -s .env.shared ]; then
            cp .env .env.bak
            while IFS= read -r line; do
              key="${line%%=*}"
              [ -n "$key" ] || continue
              grep -v "^${key}=" .env > .env.tmp || true
              mv .env.tmp .env
              printf '%s\n' "$line" >> .env
            done < .env.shared
            rm -f .env.shared
            echo "Synced PROD_ENV keys into runtime .env (VM-only keys preserved)."
          fi
          pm2 startOrReload deploy/ecosystem.config.js --update-env
          pm2 save
          echo "Deploy complete."
          REMOTE
