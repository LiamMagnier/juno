name: Cloud Code runner

# Dispatched by the Juno backend (CC1) for a single "Cloud Juno Code" task. The
# job pulls the task's runner-context, clones the target repo, drives the
# vendored agent core against the prompt, and opens a PR with the result.
#
# SECURITY: this job runs arbitrary agent-authored bash. NO credential rides the
# workflow inputs — every input below is non-secret and safe to appear in the
# public Actions log. The runner authenticates its ONE bootstrap call
# (runner-context) with a GitHub Actions OIDC token it fetches at runtime
# (audience "juno-cloud-code"): GitHub signs it, the backend verifies the
# signature + repo + workflow claims, and the JWT is never logged. runner-context
# returns a real task token + clone token that live only in the driver's memory.
# Model calls proxy through Juno's /api/agent using the task token.
#
# permissions:
#   id-token: write  — REQUIRED so the driver can fetch the OIDC JWT
#                      (provisions ACTIONS_ID_TOKEN_REQUEST_URL / _TOKEN).
#   contents: read   — keeps the default GITHUB_TOKEN from carrying write scope
#                      into the sandbox; the runner never uses it (clone/push/PR
#                      go through the OAuth clone token from runner-context).

on:
  workflow_dispatch:
    inputs:
      taskId:
        description: Cloud Code task id
        required: true
        type: string
      repoOwner:
        description: Target repository owner
        required: true
        type: string
      repoName:
        description: Target repository name
        required: true
        type: string
      baseRef:
        description: Base branch to work from (empty = repository default)
        required: false
        type: string
      callbackBase:
        description: Juno origin (no /api), e.g. https://chat.liams.dev
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  # One runner per task; a duplicate dispatch queues rather than racing.
  group: cloud-code-${{ inputs.taskId }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # A hard ceiling on the run. If the driver is hard-killed (OOM, cancel) before
    # it can post its own terminal `failed` event, the task simply stays 'running'
    # until this timeout reaps the job — we deliberately keep NO token on disk to
    # reconstruct auth from. (A server-side stuck-task sweep is a documented
    # follow-up.)
    timeout-minutes: 30
    steps:
      - name: Checkout runner (LiamMagnier/juno)
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build the vendored agent core
        working-directory: runner/agent-core
        run: |
          npm i
          npm run build

      - name: Run the Cloud Code task
        # The driver fetches its OWN GitHub Actions OIDC JWT at runtime using the
        # auto-provisioned ACTIONS_ID_TOKEN_REQUEST_URL / ACTIONS_ID_TOKEN_REQUEST_TOKEN
        # env vars (present because this job has id-token: write). GitHub auto-masks
        # the request token, and the driver never echoes it or the JWT. No secret is
        # passed in via inputs, so none can reach the public log.
        env:
          JUNO_TASK_ID: ${{ inputs.taskId }}
          JUNO_REPO_OWNER: ${{ inputs.repoOwner }}
          JUNO_REPO_NAME: ${{ inputs.repoName }}
          JUNO_BASE_REF: ${{ inputs.baseRef }}
          JUNO_CALLBACK_BASE: ${{ inputs.callbackBase }}
        run: node scripts/cloud-code-runner.mjs
