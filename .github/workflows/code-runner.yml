name: Cloud Code runner

# Dispatched by the Juno backend (CC1) for a single "Cloud Juno Code" task. The
# job pulls the task's runner-context, clones the target repo, drives the
# vendored agent core against the prompt, and opens a PR with the result.
#
# SECURITY: this job runs arbitrary agent-authored bash. It is given ONLY a
# one-time exchange code and the callback origin — never .env, the DB URL,
# AUTH_SECRET, or any provider key. The runner redeems the exchange code ONCE
# (runner-context) for a real task token + clone token that live only in the
# driver's memory; the exchange code is single-used server-side and inert
# thereafter. Model calls proxy through Juno's /api/agent using the task token.
# `permissions: contents: read` keeps the default GITHUB_TOKEN from carrying
# write scope into the sandbox; the runner never uses it (clone/push/PR go
# through the OAuth clone token from runner-context).

on:
  workflow_dispatch:
    inputs:
      taskId:
        description: Cloud Code task id
        required: true
        type: string
      exchangeCode:
        description: One-time exchange code (redeemed once at runner-context for the real task token)
        required: true
        type: string
      repoOwner:
        description: Target repository owner
        required: true
        type: string
      repoName:
        description: Target repository name
        required: true
        type: string
      baseRef:
        description: Base branch to work from (empty = repository default)
        required: false
        type: string
      callbackBase:
        description: Juno origin (no /api), e.g. https://chat.liams.dev
        required: true
        type: string

permissions:
  contents: read

concurrency:
  # One runner per task; a duplicate dispatch queues rather than racing.
  group: cloud-code-${{ inputs.taskId }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # A hard ceiling on the run. If the driver is hard-killed (OOM, cancel) before
    # it can post its own terminal `failed` event, the task simply stays 'running'
    # until this timeout reaps the job — we deliberately keep NO token on disk to
    # reconstruct auth from. (A server-side stuck-task sweep is a documented
    # follow-up.)
    timeout-minutes: 30
    steps:
      # FIRST: register the exchange code as a masked secret so it can never
      # surface in any later log line. Passed via env to avoid interpolating it
      # straight into the shell.
      - name: Mask the exchange code
        env:
          EXCHANGE_CODE: ${{ inputs.exchangeCode }}
        run: echo "::add-mask::$EXCHANGE_CODE"

      - name: Checkout runner (LiamMagnier/juno)
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build the vendored agent core
        working-directory: runner/agent-core
        run: |
          npm i
          npm run build

      - name: Run the Cloud Code task
        env:
          JUNO_TASK_ID: ${{ inputs.taskId }}
          JUNO_EXCHANGE_CODE: ${{ inputs.exchangeCode }}
          JUNO_REPO_OWNER: ${{ inputs.repoOwner }}
          JUNO_REPO_NAME: ${{ inputs.repoName }}
          JUNO_BASE_REF: ${{ inputs.baseRef }}
          JUNO_CALLBACK_BASE: ${{ inputs.callbackBase }}
        run: node scripts/cloud-code-runner.mjs
