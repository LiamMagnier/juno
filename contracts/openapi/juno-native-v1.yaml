          properties:
            code: { type: string }
            message: { type: string }
            requestId: { type: string }
            retryable: { type: boolean }
            retryAfterMs: { type: [integer, 'null'] }
    GeneralRouteErrorEnvelope:
      type: object
      additionalProperties: true
      required: [error]
      properties:
        error: { type: string }
        message: { type: string }
        code: { type: string }
        retryable: { type: boolean }
