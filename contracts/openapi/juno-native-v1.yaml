        # is tracked as GAP-022.
        path: { type: string }
        lastOpenedAt: { type: string, format: date-time }
    CodeWorkspacesResponse:
      type: object
      additionalProperties: false
      required: [workspaces]
      properties:
        workspaces: { type: array, items: { $ref: '#/components/schemas/CodeWorkspace' } }
    CodeSession:
      type: object
      additionalProperties: true
      required: [id, deviceId, workspaceName, workspaceKey, title, prompt, status, lastSeq, target, createdAt, updatedAt]
      properties:
        id: { type: string }
        deviceId: { type: [string, 'null'] }
        # Device-local; native clients MUST NOT surface it (GAP-022).
        workspacePath: { type: string }
        workspaceName: { type: string }
        workspaceKey: { type: [string, 'null'] }
        title: { type: string }
        prompt: { type: string }
        status: { type: string, enum: [queued, running, awaiting_approval, completed, failed, cancelled] }
        lastSeq: { type: integer, minimum: 0 }
        conversationId: { type: [string, 'null'] }
        target: { type: string, enum: [device, cloud] }
        repoOwner: { type: [string, 'null'] }
        repoName: { type: [string, 'null'] }
        baseRef: { type: [string, 'null'] }
        prUrl: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CodeSessionEvent:
      type: object
      additionalProperties: false
      required: [seq, kind, payload, createdAt]
